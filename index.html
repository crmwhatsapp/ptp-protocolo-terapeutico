<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Terapêutico Premium - Validar Acesso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 50px 40px;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            background: #f8f9ff;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 30px;
            text-align: left;
            font-size: 14px;
            color: #555;
        }

        .success-details {
            text-align: left;
            background: #f0f8ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .success-details h3 {
            color: #0066cc;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .success-details p {
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .btn-redirect {
            background: #28a745;
            margin-top: 15px;
        }

        .btn-redirect:hover {
            background: #218838;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            button {
                padding: 12px 20px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔐</div>
        <h1>Protocolo Terapêutico Premium</h1>
        <p class="subtitle">Validar seu acesso</p>

        <div class="info-box">
            <strong>Como funciona:</strong>
            Cole o código recebido no email e valide seu acesso.
        </div>

        <div id="form-container">
            <div class="form-group">
                <label for="codigo">Seu código de acesso:</label>
                <textarea id="codigo" placeholder="Cole aqui o código que recebeu no email..." spellcheck="false"></textarea>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="validarAcesso()">Validar Acesso</button>
                <button class="btn-secondary" onclick="limparFormulario()">Limpar</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Validando...</p>
        </div>

        <div class="message" id="message"></div>

        <div class="success-details" id="success-details">
            <h3>✅ Acesso Confirmado!</h3>
            <p><strong>Nome:</strong> <span id="nome-usuario"></span></p>
            <p><strong>Válido até:</strong> <span id="validade"></span></p>
            <button class="btn-primary btn-redirect" onclick="abrirClaude()">
                Ir para Claude.ai →
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ojyvtbxwtlpfjqvewqla.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ekDjPhtV-akmfZoPd66dKg_dKLZkFZI";

        async function validarAcesso() {
            const codigo = document.getElementById('codigo').value.trim();

            if (!codigo) {
                exibirMensagem('Por favor, digite seu código de acesso.', 'error');
                return;
            }

            if (codigo.length < 10) {
                exibirMensagem('O código parece incompleto. Verifique se copiou tudo.', 'error');
                return;
            }

            mostrarCarregando(true);

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/rpc/validar_acesso`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        },
                        body: JSON.stringify({ p_codigo: codigo })
                    }
                );

                const data = await response.json();

                if (response.ok && data && data.valido) {
                    exibirSucesso(data);
                    document.getElementById('form-container').style.display = 'none';
                } else {
                    exibirMensagem(
                        data.mensagem || 'Código inválido ou expirado. Verifique e tente novamente.',
                        'error'
                    );
                }
            } catch (erro) {
                console.error('Erro:', erro);
                exibirMensagem(
                    'Houve um erro ao validar o código. Tente novamente mais tarde.',
                    'error'
                );
            } finally {
                mostrarCarregando(false);
            }
        }

        function exibirMensagem(texto, tipo) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = texto;
            messageEl.className = `message ${tipo}`;
        }

        function exibirSucesso(data) {
            exibirMensagem('Acesso validado com sucesso! ✅', 'success');
            document.getElementById('nome-usuario').textContent = data.nome || 'Usuário';
            document.getElementById('validade').textContent = data.data_validade || 'Data não disponível';
            document.getElementById('success-details').style.display = 'block';
        }

        function mostrarCarregando(mostrar) {
            document.getElementById('loading').style.display = mostrar ? 'block' : 'none';
            document.getElementById('form-container').style.display = mostrar ? 'none' : 'block';
        }

        function limparFormulario() {
            document.getElementById('codigo').value = '';
            document.getElementById('message').className = 'message';
            document.getElementById('success-details').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';
            document.getElementById('codigo').focus();
        }

        function abrirClaude() {
            window.location.href = 'https://claude.ai';
        }

        window.addEventListener('load', function() {
            const params = new URLSearchParams(window.location.search);
            const codigoURL = params.get('codigo');

            if (codigoURL) {
                document.getElementById('codigo').value = codigoURL;
                validarAcesso();
            } else {
                document.getElementById('codigo').focus();
            }
        });

        document.getElementById('codigo').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                validarAcesso();
            }
        });
    </script>
</body>
</html>
